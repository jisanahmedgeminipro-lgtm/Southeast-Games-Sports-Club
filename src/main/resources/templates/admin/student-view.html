<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Student | SEU Admin', 'View a student profile.')}"></head>
<body>
<div class="dash">
    <aside th:replace="~{fragments/admin :: sidebar('students')}"></aside>
    <div class="dash__overlay"></div>
    <div class="dash__main">
        <header th:replace="~{fragments/admin :: topbar('Student')}"></header>
        <div class="dash__content">
            <th:block th:replace="~{fragments/admin :: flash}"></th:block>
            <div class="admin-head"><h2 th:text="${student.fullName}">Student</h2>
                <a class="btn btn-ghost" th:href="@{/admin/students}"><i class="bi bi-arrow-left"></i> Back</a></div>

            <div class="form-card">
                <img class="current-image" th:if="${student.profilePictureUrl != null}" th:src="${student.profilePictureUrl}" alt="Profile">
                <div class="detail-list table-wrap"><table class="table">
                    <tbody>
                        <tr><th>Full Name</th><td th:text="${student.fullName}">Name</td></tr>
                        <tr><th>Student ID</th><td th:text="${student.studentId}">ID</td></tr>
                        <tr><th>Email</th><td th:text="${student.email}">email</td></tr>
                        <tr><th>Department</th><td th:text="${student.department}">CSE</td></tr>
                        <tr><th>Batch</th><td th:text="${student.batch}">63</td></tr>
                        <tr><th>Semester</th><td th:text="${student.semester}">Spring</td></tr>
                        <tr><th>Phone</th><td th:text="${student.phone}">phone</td></tr>
                        <tr><th>Gender</th><td th:text="${student.gender}">MALE</td></tr>
                        <tr><th>Status</th><td><span class="badge" th:classappend="${student.active} ? 'badge--green' : 'badge--slate'" th:text="${student.active} ? 'Active' : 'Inactive'">Active</span></td></tr>
                    </tbody>
                </table></div>
                <div class="form-actions">
                    <form th:action="@{/admin/students/{id}/activate(id=${student.id})}" method="post" class="form-inline">
                        <input type="hidden" name="active" th:value="${!student.active}">
                        <button class="btn btn-outline" type="submit">
                            <i class="bi" th:classappend="${student.active} ? 'bi-pause-circle' : 'bi-play-circle'"></i>
                            <span th:text="${student.active} ? 'Deactivate' : 'Activate'">Toggle</span>
                        </button>
                    </form>
                    <form th:action="@{/admin/students/{id}/delete(id=${student.id})}" method="post" class="form-inline">
                        <button class="btn btn-danger" type="button" data-confirm="Delete this student account permanently?" data-confirm-title="Delete student?"><i class="bi bi-trash"></i> Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/components :: overlays}"></th:block>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
