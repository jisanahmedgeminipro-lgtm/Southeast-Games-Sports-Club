<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Membership Applications | SEU Admin', 'Review membership applications.')}"></head>
<body>
<div class="dash">
    <aside th:replace="~{fragments/admin :: sidebar('applications')}"></aside>
    <div class="dash__overlay"></div>
    <div class="dash__main">
        <header th:replace="~{fragments/admin :: topbar('Applications')}"></header>
        <div class="dash__content">
            <th:block th:replace="~{fragments/admin :: flash}"></th:block>
            <div class="admin-head"><h2>Membership Applications</h2></div>

            <div class="dt dt--responsive" id="appTable" data-enhanced-table data-page-size="15" data-export-name="applications">
                <div class="dt__toolbar">
                    <div class="dt__search"><i class="bi bi-search"></i><input type="search" data-dt-search placeholder="Search applicants..."></div>
                    <select class="dt__filter" data-dt-filter data-col="3">
                        <option value="">All statuses</option><option value="PENDING">Pending</option>
                        <option value="APPROVED">Approved</option><option value="REJECTED">Rejected</option><option value="WITHDRAWN">Withdrawn</option>
                    </select>
                    <button class="btn btn-outline btn-sm" type="button" data-dt-export><i class="bi bi-filetype-csv"></i> CSV</button>
                    <button class="btn btn-outline btn-sm" type="button" data-dt-export-excel><i class="bi bi-file-earmark-excel"></i> Excel</button>
                </div>
                <div class="table-wrap"><table class="table">
                    <thead><tr><th data-sort>Student</th><th data-sort>Email</th><th data-sort>Period</th>
                        <th data-sort>Status</th><th data-sort>Applied</th><th data-dt-skip>Actions</th></tr></thead>
                    <tbody>
                        <tr th:each="a : ${applications}">
                            <td data-label="Student" th:text="${a.studentName}">Student</td>
                            <td data-label="Email" th:text="${a.studentEmail}">email</td>
                            <td data-label="Period" th:text="${a.periodTitle}">Drive</td>
                            <td data-label="Status"><span class="badge"
                                th:classappend="${a.status == 'APPROVED'} ? 'badge--green' : (${a.status == 'REJECTED'} ? 'badge--red' : 'badge--amber')"
                                th:text="${a.status}">PENDING</span></td>
                            <td data-label="Applied" th:text="${a.appliedAt}">date</td>
                            <td data-label="Actions" data-dt-skip><div class="row-actions">
                                <form th:action="@{/admin/applications/{id}/approve(id=${a.id})}" method="post" class="form-inline">
                                    <button class="btn btn-primary btn-sm" type="button" th:disabled="${a.status == 'APPROVED'}"
                                            data-confirm="Approve this application?" data-confirm-title="Approve?" data-confirm-ok-text="Approve"><i class="bi bi-check2"></i></button>
                                </form>
                                <form th:action="@{/admin/applications/{id}/reject(id=${a.id})}" method="post" class="form-inline">
                                    <button class="btn btn-outline btn-sm" type="button" th:disabled="${a.status == 'REJECTED'}"
                                            data-confirm="Reject this application?" data-confirm-title="Reject?" data-confirm-ok-text="Reject"><i class="bi bi-x"></i></button>
                                </form>
                            </div></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(applications)}"><td colspan="6">
                            <div th:replace="~{fragments/components :: emptyState('bi-inbox','No applications','Applications will appear here once students apply.',null,null)}"></div></td></tr>
                    </tbody>
                </table></div>
                <div class="dt__pagination"><span class="u-muted u-sm" data-dt-info></span><div class="pages" data-dt-pages></div></div>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/components :: overlays}"></th:block>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
