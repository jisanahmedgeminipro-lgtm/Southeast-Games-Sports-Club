# =============================================================================
#  DEVELOPMENT profile  (spring.profiles.active=dev)
#  Local MySQL instance. Schema is auto-updated by Hibernate for fast iteration.
# =============================================================================

# -----------------------------------------------------------------------------
#  Datasource - local MySQL
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:seu_sports_club}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.pool-name=SeuSportsHikariPool-Dev

# -----------------------------------------------------------------------------
#  JPA / Hibernate (dev)
# -----------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# -----------------------------------------------------------------------------
#  Thymeleaf - disable caching for live template edits
# -----------------------------------------------------------------------------
spring.thymeleaf.cache=false

# -----------------------------------------------------------------------------
#  Logging
# -----------------------------------------------------------------------------
logging.level.root=INFO
logging.level.bd.edu.seu.gamesclub=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# -----------------------------------------------------------------------------
#  Error details (DEV ONLY) - surface the real cause on the error page so issues
#  can be diagnosed quickly. Do NOT enable these in production.
# -----------------------------------------------------------------------------
server.error.include-message=always
server.error.include-exception=true
server.error.include-stacktrace=on_param
