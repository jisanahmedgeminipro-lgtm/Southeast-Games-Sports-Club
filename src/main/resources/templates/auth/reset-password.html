<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Set New Password | SEU Games & Sports Club', 'Choose a new password for your SEU Games & Sports Club account.')}"></head>
<body>
<div class="auth">
    <aside class="auth__aside">
        <a class="auth__back" th:href="@{/login}"><i class="bi bi-arrow-left"></i> Back to sign in</a>
        <a class="brand" th:href="@{/}"><span class="brand__logo"><i class="bi bi-trophy"></i></span>
            <span class="brand__name">Games &amp; Sports Club<small>Southeast University</small></span></a>
        <div class="auth__aside-content">
            <h2>Almost there.</h2>
            <p>Enter the code we sent you and choose a new, secure password.</p>
        </div>
    </aside>

    <main class="auth__main">
        <div class="auth__card">
            <div class="top">
                <h1>New password</h1>
                <p class="sub">For <strong th:text="${email} ?: 'your account'">your account</strong>.</p>
            </div>

            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}" role="alert"></div>
            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}" role="alert"></div>

            <form th:action="@{/reset-password}" method="post" novalidate>
                <input type="hidden" name="email" th:value="${email}">
                <input type="hidden" name="otp" data-otp-value>

                <label class="otp-label">Verification Code</label>
                <div class="otp-inputs" role="group" aria-label="One-time code">
                    <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 1" autofocus>
                    <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 2">
                    <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 3">
                    <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 4">
                    <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 5">
                    <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 6">
                </div>

                <div class="field">
                    <label for="newPassword">New Password</label>
                    <div class="input-group">
                        <input class="control" id="newPassword" name="password" type="password" autocomplete="new-password" required>
                        <button class="toggle-eye" type="button" data-toggle-password="#newPassword" aria-label="Show password"><i class="bi bi-eye"></i></button>
                    </div>
                </div>
                <div class="field">
                    <label for="confirmNew">Confirm New Password</label>
                    <input class="control" id="confirmNew" name="confirmPassword" type="password" autocomplete="new-password" required>
                </div>

                <button class="btn btn-primary btn-block btn-lg" type="submit"><i class="bi bi-shield-check"></i> Update password</button>
            </form>

            <div class="u-mt-3 u-text-center">
                <p class="otp-timer" data-resend-timer></p>
                <form th:action="@{/forgot-password}" method="post" class="form-inline">
                    <input type="hidden" name="email" th:value="${email}">
                    <button class="link-muted resend-btn" type="submit" data-resend="60">Resend code</button>
                </form>
            </div>
        </div>
    </main>
</div>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
