<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Committee Member | SEU Admin', 'Create or edit a committee member.')}"></head>
<body>
<div class="dash">
    <aside th:replace="~{fragments/admin :: sidebar('committee')}"></aside>
    <div class="dash__overlay"></div>
    <div class="dash__main">
        <header th:replace="~{fragments/admin :: topbar('Committee Member')}"></header>
        <div class="dash__content">
            <th:block th:replace="~{fragments/admin :: flash}"></th:block>
            <div class="admin-head">
                <h2 th:text="${member != null} ? 'Edit Member' : 'New Member'">Member</h2>
                <a class="btn btn-ghost" th:href="@{/admin/committee}"><i class="bi bi-arrow-left"></i> Back</a>
            </div>

            <form class="form-card" th:action="@{/admin/committee/save}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="id" th:if="${member != null}" th:value="${member.id}">
                <div class="form-grid">
                    <div class="field"><label for="committeeType">Committee</label>
                        <select class="control" id="committeeType" name="committeeType" required>
                            <option value="EXECUTIVE" th:selected="${member != null and member.committeeType == 'EXECUTIVE'}">Executive</option>
                            <option value="SUB_EXECUTIVE" th:selected="${member != null and member.committeeType == 'SUB_EXECUTIVE'}">Sub Executive</option>
                        </select></div>
                    <div class="field"><label for="name">Full Name</label>
                        <input class="control" id="name" name="name" type="text" required th:value="${member?.name}"></div>
                    <div class="field"><label for="position">Position</label>
                        <input class="control" id="position" name="position" type="text" required th:value="${member?.position}"></div>
                    <div class="field"><label for="department">Department</label>
                        <input class="control" id="department" name="department" type="text" required th:value="${member?.department}"></div>
                    <div class="field"><label for="batch">Batch</label>
                        <input class="control" id="batch" name="batch" type="text" required th:value="${member?.batch}"></div>
                    <div class="field"><label for="sessionYear">Session</label>
                        <input class="control" id="sessionYear" name="sessionYear" type="text" placeholder="2025-2026" th:value="${member?.sessionYear}"></div>
                    <div class="field"><label for="facebookUrl">Facebook URL</label>
                        <input class="control" id="facebookUrl" name="facebookUrl" type="url" th:value="${member?.facebookUrl}"></div>
                    <div class="field"><label for="linkedinUrl">LinkedIn URL</label>
                        <input class="control" id="linkedinUrl" name="linkedinUrl" type="url" th:value="${member?.linkedinUrl}"></div>
                    <div class="field"><label for="displayOrder">Display Order</label>
                        <input class="control" id="displayOrder" name="displayOrder" type="number" th:value="${member?.displayOrder}"></div>
                    <div class="field"><label>&nbsp;</label>
                        <label class="switch-inline"><input type="checkbox" name="active" value="true" th:checked="${member == null or member.active}"> Active</label></div>
                </div>

                <label class="u-fw-600 u-mb-1 u-block">Photo</label>
                <img class="current-image" th:if="${member != null and member.photoUrl != null}" th:src="${member.photoUrl}" alt="Photo">
                <input type="hidden" name="currentPhotoMediaId" th:value="${member?.photoMediaId}">
                <div th:replace="~{fragments/components :: imageUpload('photoFile','Upload photo (optional)',false)}"></div>

                <div class="form-actions">
                    <button class="btn btn-primary" type="submit"><i class="bi bi-save"></i> Save</button>
                    <a class="btn btn-ghost" th:href="@{/admin/committee}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/components :: overlays}"></th:block>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
