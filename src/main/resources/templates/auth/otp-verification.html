<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Verify Email | SEU Games & Sports Club', 'Enter the one-time code we sent to your email.')}"></head>
<body>
<div class="auth">
    <aside class="auth__aside">
        <a class="auth__back" th:href="@{/register}"><i class="bi bi-arrow-left"></i> Back</a>
        <a class="brand" th:href="@{/}"><span class="brand__logo"><i class="bi bi-trophy"></i></span>
            <span class="brand__name">Games &amp; Sports Club<small>Southeast University</small></span></a>
        <div class="auth__aside-content">
            <h2>One quick step.</h2>
            <p>We've sent a 6-digit verification code to your university email. Enter it to confirm your account.</p>
            <ul class="auth__points">
                <li><i class="bi bi-shield-lock"></i> The code expires in 5 minutes</li>
                <li><i class="bi bi-arrow-repeat"></i> You can resend it after 60 seconds</li>
            </ul>
        </div>
    </aside>

    <main class="auth__main">
        <div class="auth__card">
            <div class="top">
                <h1>Verify your email</h1>
                <p class="sub">Enter the code sent to
                    <strong th:text="${email} ?: 'your email'">your email</strong>.</p>
            </div>

            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}" role="alert"></div>
            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}" role="alert"></div>

            <form th:action="@{/verify-otp}" method="post" novalidate>
                <input type="hidden" name="email" th:value="${email}">
                <input type="hidden" name="otp" data-otp-value>

                <div class="otp-inputs" role="group" aria-label="One-time code">
                    <input type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" aria-label="Digit 1" autofocus>
                    <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 2">
                    <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 3">
                    <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 4">
                    <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 5">
                    <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 6">
                </div>

                <button class="btn btn-primary btn-block btn-lg" type="submit"><i class="bi bi-check2-circle"></i> Verify</button>
            </form>

            <div class="u-mt-3 u-text-center">
                <p class="otp-timer" data-resend-timer></p>
                <form th:action="@{/resend-otp}" method="post" class="form-inline">
                    <input type="hidden" name="email" th:value="${email}">
                    <button class="link-muted resend-btn" type="submit" data-resend="60">Resend code</button>
                </form>
            </div>
        </div>
    </main>
</div>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
