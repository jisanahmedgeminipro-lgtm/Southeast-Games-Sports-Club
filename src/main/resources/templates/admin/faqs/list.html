<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('FAQs | SEU Admin', 'Manage FAQs.')}"></head>
<body>
<div class="dash">
    <aside th:replace="~{fragments/admin :: sidebar('faqs')}"></aside>
    <div class="dash__overlay"></div>
    <div class="dash__main">
        <header th:replace="~{fragments/admin :: topbar('FAQs')}"></header>
        <div class="dash__content">
            <th:block th:replace="~{fragments/admin :: flash}"></th:block>
            <div class="admin-head"><h2>FAQs</h2>
                <div class="admin-head__actions"><a class="btn btn-primary" th:href="@{/admin/faqs/new}"><i class="bi bi-plus-lg"></i> Add FAQ</a></div></div>

            <div class="dt dt--responsive" id="faqTable" data-enhanced-table data-page-size="10"
                 data-export-name="faqs" data-bulk-action="/admin/faqs/bulk-delete">
                <div class="dt__toolbar">
                    <div class="dt__search"><i class="bi bi-search"></i><input type="search" data-dt-search placeholder="Search questions..."></div>
                    <button class="btn btn-outline btn-sm" type="button" data-dt-export><i class="bi bi-filetype-csv"></i> CSV</button>
                    <button class="btn btn-outline btn-sm" type="button" data-dt-export-excel><i class="bi bi-file-earmark-excel"></i> Excel</button>
                </div>
                <div class="dt__bulkbar" data-dt-bulkbar><span><strong data-dt-count>0</strong> selected</span>
                    <button class="btn btn-danger btn-sm" type="button" data-dt-bulk-delete><i class="bi bi-trash"></i> Delete selected</button></div>
                <div class="table-wrap"><table class="table">
                    <thead><tr><th data-dt-skip><input type="checkbox" data-dt-select-all></th>
                        <th data-sort>Question</th><th data-sort>Order</th><th data-sort>Active</th><th data-dt-skip>Actions</th></tr></thead>
                    <tbody>
                        <tr th:each="f : ${faqs}">
                            <td data-dt-skip><input type="checkbox" data-dt-row name="ids" th:value="${f.id}"></td>
                            <td data-label="Question" th:text="${f.question}">Question?</td>
                            <td data-label="Order" th:text="${f.displayOrder}">0</td>
                            <td data-label="Active"><span class="badge" th:classappend="${f.active} ? 'badge--green' : 'badge--slate'" th:text="${f.active} ? 'Yes' : 'No'">Yes</span></td>
                            <td data-label="Actions" data-dt-skip><div class="row-actions">
                                <a class="icon-btn" th:href="@{/admin/faqs/{id}/edit(id=${f.id})}"><i class="bi bi-pencil"></i></a>
                                <form th:action="@{/admin/faqs/{id}/delete(id=${f.id})}" method="post" class="form-inline">
                                    <button class="icon-btn" type="button" data-confirm="Delete this FAQ?" data-confirm-title="Delete FAQ?"><i class="bi bi-trash"></i></button>
                                </form></div></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(faqs)}"><td colspan="5">
                            <div th:replace="~{fragments/components :: emptyState('bi-question-circle','No FAQs yet','Add common questions and answers.','/admin/faqs/new','Add FAQ')}"></div></td></tr>
                    </tbody>
                </table></div>
                <div class="dt__pagination"><span class="u-muted u-sm" data-dt-info></span><div class="pages" data-dt-pages></div></div>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/components :: overlays}"></th:block>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
