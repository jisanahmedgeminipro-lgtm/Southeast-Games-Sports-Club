<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Forgot Password | SEU Games & Sports Club', 'Reset your SEU Games & Sports Club account password.')}"></head>
<body>
<div class="auth">
    <aside class="auth__aside">
        <a class="auth__back" th:href="@{/login}"><i class="bi bi-arrow-left"></i> Back to sign in</a>
        <a class="brand" th:href="@{/}"><span class="brand__logo"><i class="bi bi-trophy"></i></span>
            <span class="brand__name">Games &amp; Sports Club<small>Southeast University</small></span></a>
        <div class="auth__aside-content">
            <h2>Forgot your password?</h2>
            <p>No worries. Enter your university email and we'll send a verification code to reset it.</p>
        </div>
    </aside>

    <main class="auth__main">
        <div class="auth__card">
            <div class="top">
                <h1>Reset password</h1>
                <p class="sub">We'll email you a one-time code.</p>
            </div>

            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}" role="alert"></div>
            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}" role="alert"></div>

            <form th:action="@{/forgot-password}" method="post" novalidate>
                <div class="field">
                    <label for="fpEmail">University Email</label>
                    <input class="control" id="fpEmail" name="email" type="email" autocomplete="email"
                           placeholder="2023000000000@seu.edu.bd" required>
                </div>
                <button class="btn btn-primary btn-block btn-lg" type="submit"><i class="bi bi-envelope-paper"></i> Send reset code</button>
            </form>

            <p class="auth__alt">Remembered it? <a th:href="@{/login}">Sign in</a></p>
        </div>
    </main>
</div>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
