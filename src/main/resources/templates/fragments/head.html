<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<!--
  Shared <head> fragment.
  Usage: <head th:replace="~{fragments/head :: head('Page Title', 'Meta description')}"></head>
  Loads the design system, vendor CSS (Bootstrap Icons, AOS, Swiper) and fonts,
  plus an inline theme bootstrap to avoid a flash of the wrong color scheme.
-->
<head th:fragment="head(pageTitle, pageDescription)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <!-- Theme bootstrap (runs before paint) -->
    <script>
        (function () {
            try {
                var t = localStorage.getItem('seu-theme')
                    || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', t);
            } catch (e) {}
        })();
    </script>

    <!-- SEO -->
    <title th:text="${pageTitle} ?: 'Southeast University Games &amp; Sports Club'">SEU Games &amp; Sports Club</title>
    <meta name="description"
          th:attr="content=${pageDescription} ?: 'Official website of the Southeast University Games &amp; Sports Club - events, news, committees, sports and membership.'">
    <meta name="theme-color" content="#1560b3">
    <meta name="robots" content="index, follow">

    <!-- CSRF (for JS-built forms such as bulk actions) -->
    <meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf.token}">
    <meta name="_csrf_param" th:if="${_csrf != null}" th:content="${_csrf.parameterName}">

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="SEU Games &amp; Sports Club">
    <meta property="og:title" th:attr="content=${pageTitle} ?: 'SEU Games &amp; Sports Club'">
    <meta property="og:description"
          th:attr="content=${pageDescription} ?: 'Official website of the Southeast University Games &amp; Sports Club.'">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Favicon (inline SVG, no extra request) -->
    <link rel="icon"
          href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%231560b3'/%3E%3Ctext x='50' y='70' font-size='62' text-anchor='middle' fill='%23f5b301' font-family='Arial' font-weight='bold'%3ES%3C/text%3E%3C/svg%3E">
    <link rel="apple-touch-icon" th:href="@{/images/icon.svg}">

    <!-- PWA -->
    <link rel="manifest" th:href="@{/app.webmanifest}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="SEU Sports">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="msapplication-TileColor" content="#1560b3">
    <meta name="color-scheme" content="light dark">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Vendor CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

    <!-- App CSS -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body></body>
</html>
