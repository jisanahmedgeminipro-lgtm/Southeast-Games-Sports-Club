<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('System Settings | SEU Admin', 'Manage site/application configuration.')}"></head>
<body>
<div class="dash">
    <aside th:replace="~{fragments/admin :: sidebar('system')}"></aside>
    <div class="dash__overlay"></div>
    <div class="dash__main">
        <header th:replace="~{fragments/admin :: topbar('System Settings')}"></header>
        <div class="dash__content">
            <th:block th:replace="~{fragments/admin :: flash}"></th:block>

            <div class="admin-head"><h2>System Settings</h2></div>

            <form class="form-card" th:action="@{/admin/settings/system}" method="post" enctype="multipart/form-data">
                <div class="form-grid">
                    <div class="field"><label for="siteTitle">Site Title</label>
                        <input class="control" id="siteTitle" name="siteTitle" type="text" required th:value="${settings.siteTitle}"></div>
                    <div class="field"><label for="themeColor">Theme Color (hex)</label>
                        <input class="control" id="themeColor" name="themeColor" type="text" placeholder="#0f766e"
                               pattern="^#(?:[0-9a-fA-F]{3}|[0-9a-fA-F]{6})$" th:value="${settings.themeColor}"></div>
                    <div class="field"><label for="smtpSenderName">SMTP Sender Name</label>
                        <input class="control" id="smtpSenderName" name="smtpSenderName" type="text" th:value="${settings.smtpSenderName}"></div>
                    <div class="field"><label for="footerCopyright">Footer Copyright</label>
                        <input class="control" id="footerCopyright" name="footerCopyright" type="text" th:value="${settings.footerCopyright}"></div>
                </div>

                <div class="field">
                    <label class="switch-inline">
                        <input type="checkbox" name="maintenanceMode" value="true" th:checked="${settings.maintenanceMode}">
                        Enable maintenance mode (public site shows a maintenance page)
                    </label>
                </div>

                <label class="u-fw-600 u-mb-1 u-block">Favicon</label>
                <img class="current-image" th:if="${settings.faviconUrl != null}" th:src="${settings.faviconUrl}" alt="Current favicon">
                <input type="hidden" name="currentFaviconMediaId" th:value="${settings.faviconMediaId}">
                <div th:replace="~{fragments/components :: imageUpload('faviconFile','Upload new favicon (optional)',false)}"></div>

                <div class="form-actions">
                    <button class="btn btn-primary" type="submit"><i class="bi bi-save"></i> Save Settings</button>
                </div>
            </form>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/components :: overlays}"></th:block>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
