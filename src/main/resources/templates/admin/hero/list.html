<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Hero Sliders | SEU Admin', 'Manage landing hero slides.')}"></head>
<body>
<div class="dash">
    <aside th:replace="~{fragments/admin :: sidebar('hero')}"></aside>
    <div class="dash__overlay"></div>
    <div class="dash__main">
        <header th:replace="~{fragments/admin :: topbar('Hero Sliders')}"></header>
        <div class="dash__content">
            <th:block th:replace="~{fragments/admin :: flash}"></th:block>
            <div class="admin-head">
                <h2>Hero Sliders</h2>
                <div class="admin-head__actions">
                    <a class="btn btn-primary" th:href="@{/admin/hero-sliders/new}"><i class="bi bi-plus-lg"></i> Add Slide</a>
                </div>
            </div>

            <div class="dt dt--responsive" id="heroTable" data-enhanced-table data-page-size="10"
                 data-export-name="hero-sliders" data-bulk-action="/admin/hero-sliders/bulk-delete">
                <div class="dt__toolbar">
                    <div class="dt__search"><i class="bi bi-search"></i><input type="search" data-dt-search placeholder="Search slides..."></div>
                    <button class="btn btn-outline btn-sm" type="button" data-dt-export><i class="bi bi-filetype-csv"></i> CSV</button>
                    <button class="btn btn-outline btn-sm" type="button" data-dt-export-excel><i class="bi bi-file-earmark-excel"></i> Excel</button>
                </div>
                <div class="dt__bulkbar" data-dt-bulkbar>
                    <span><strong data-dt-count>0</strong> selected</span>
                    <button class="btn btn-danger btn-sm" type="button" data-dt-bulk-delete><i class="bi bi-trash"></i> Delete selected</button>
                </div>
                <div class="table-wrap">
                    <table class="table">
                        <thead><tr>
                            <th data-dt-skip><input type="checkbox" data-dt-select-all aria-label="Select all"></th>
                            <th data-sort>Title</th><th data-sort>Subtitle</th><th data-sort>Order</th>
                            <th data-sort>Active</th><th data-dt-skip>Actions</th>
                        </tr></thead>
                        <tbody>
                            <tr th:each="s : ${sliders}">
                                <td data-dt-skip><input type="checkbox" data-dt-row name="ids" th:value="${s.id}"></td>
                                <td data-label="Title" th:text="${s.title} ?: '(untitled)'">Title</td>
                                <td data-label="Subtitle" th:text="${s.subtitle}">Subtitle</td>
                                <td data-label="Order" th:text="${s.displayOrder}">0</td>
                                <td data-label="Active"><span class="badge" th:classappend="${s.active} ? 'badge--green' : 'badge--slate'" th:text="${s.active} ? 'Yes' : 'No'">Yes</span></td>
                                <td data-label="Actions" data-dt-skip>
                                    <div class="row-actions">
                                        <a class="icon-btn" th:href="@{/admin/hero-sliders/{id}/edit(id=${s.id})}" aria-label="Edit"><i class="bi bi-pencil"></i></a>
                                        <form th:action="@{/admin/hero-sliders/{id}/delete(id=${s.id})}" method="post" class="form-inline">
                                            <button class="icon-btn" type="button" aria-label="Delete"
                                                    data-confirm="Delete this hero slide permanently?" data-confirm-title="Delete slide?"><i class="bi bi-trash"></i></button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(sliders)}"><td colspan="6">
                                <div th:replace="~{fragments/components :: emptyState('bi-card-image','No hero slides','Add your first slide to power the landing hero.','/admin/hero-sliders/new','Add Slide')}"></div>
                            </td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="dt__pagination"><span class="u-muted u-sm" data-dt-info></span><div class="pages" data-dt-pages></div></div>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/components :: overlays}"></th:block>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
