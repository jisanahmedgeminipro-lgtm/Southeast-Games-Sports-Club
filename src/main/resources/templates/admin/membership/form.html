<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Membership Period | SEU Admin', 'Create or edit a membership drive.')}"></head>
<body>
<div class="dash">
    <aside th:replace="~{fragments/admin :: sidebar('membership')}"></aside>
    <div class="dash__overlay"></div>
    <div class="dash__main">
        <header th:replace="~{fragments/admin :: topbar('Membership Period')}"></header>
        <div class="dash__content">
            <th:block th:replace="~{fragments/admin :: flash}"></th:block>
            <div class="admin-head"><h2 th:text="${period != null} ? 'Edit Period' : 'New Period'">Period</h2>
                <a class="btn btn-ghost" th:href="@{/admin/membership}"><i class="bi bi-arrow-left"></i> Back</a></div>

            <form class="form-card" th:action="@{/admin/membership/save}" method="post">
                <input type="hidden" name="id" th:if="${period != null}" th:value="${period.id}">
                <div class="field"><label for="title">Title</label>
                    <input class="control" id="title" name="title" type="text" required placeholder="Membership Drive Fall 2026" th:value="${period?.title}"></div>
                <div class="field"><label for="announcement">Announcement</label>
                    <textarea class="control" id="announcement" name="announcement" rows="4" th:text="${period?.announcement}"></textarea></div>
                <div class="form-grid">
                    <div class="field"><label for="openingDate">Opening Date</label>
                        <input class="control" id="openingDate" name="openingDate" type="date" required th:value="${period?.openingDate}"></div>
                    <div class="field"><label for="closingDate">Closing Date</label>
                        <input class="control" id="closingDate" name="closingDate" type="date" required th:value="${period?.closingDate}"></div>
                </div>
                <div class="form-actions">
                    <button class="btn btn-primary" type="submit"><i class="bi bi-save"></i> Save</button>
                    <a class="btn btn-ghost" th:href="@{/admin/membership}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/components :: overlays}"></th:block>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
