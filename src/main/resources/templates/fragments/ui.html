<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<!--
  Page chrome fragments:
    chrome     -> loading screen + scroll progress bar (place right after <body>)
    backToTop  -> floating back-to-top button (place before scripts)
-->
<body>

<th:block th:fragment="chrome">
    <div class="loader" role="status" aria-live="polite" aria-label="Loading">
        <div>
            <div class="loader__spinner" aria-hidden="true"></div>
            <p class="loader__brand">SEU Sports Club</p>
        </div>
    </div>
    <div class="scroll-progress" aria-hidden="true"></div>
</th:block>

<button th:fragment="backToTop" class="back-to-top" type="button" aria-label="Back to top">
    <i class="bi bi-arrow-up" aria-hidden="true"></i>
</button>

<!-- Reusable pagination. Usage: <nav th:replace="~{fragments/ui :: pagination(${page}, '/news')}"></nav> -->
<nav th:fragment="pagination(page, baseUrl)" class="pagination"
     th:if="${page != null and page.totalPages > 1}" aria-label="Pagination">
    <a th:classappend="${page.first} ? 'disabled'"
       th:href="@{${baseUrl}(page=${page.number - 1})}" aria-label="Previous">
        <i class="bi bi-chevron-left"></i>
    </a>
    <a th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
       th:href="@{${baseUrl}(page=${i})}"
       th:classappend="${i == page.number} ? 'active'"
       th:text="${i + 1}">1</a>
    <a th:classappend="${page.last} ? 'disabled'"
       th:href="@{${baseUrl}(page=${page.number + 1})}" aria-label="Next">
        <i class="bi bi-chevron-right"></i>
    </a>
</nav>

</body>
</html>
