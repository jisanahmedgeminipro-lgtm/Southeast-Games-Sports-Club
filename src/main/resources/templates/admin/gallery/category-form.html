<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Gallery Category | SEU Admin', 'Create or edit a gallery category.')}"></head>
<body>
<div class="dash">
    <aside th:replace="~{fragments/admin :: sidebar('gallery')}"></aside>
    <div class="dash__overlay"></div>
    <div class="dash__main">
        <header th:replace="~{fragments/admin :: topbar('Gallery Category')}"></header>
        <div class="dash__content">
            <th:block th:replace="~{fragments/admin :: flash}"></th:block>
            <div class="admin-head"><h2 th:text="${category != null} ? 'Edit Category' : 'New Category'">Category</h2>
                <a class="btn btn-ghost" th:href="@{/admin/gallery}"><i class="bi bi-arrow-left"></i> Back</a></div>

            <form class="form-card" th:action="@{/admin/gallery/categories/save}" method="post">
                <input type="hidden" name="id" th:if="${category != null}" th:value="${category.id}">
                <div class="field"><label for="name">Name</label>
                    <input class="control" id="name" name="name" type="text" required th:value="${category?.name}"></div>
                <div class="field"><label for="description">Description</label>
                    <textarea class="control" id="description" name="description" rows="3" th:text="${category?.description}"></textarea></div>
                <div class="form-actions">
                    <button class="btn btn-primary" type="submit"><i class="bi bi-save"></i> Save</button>
                    <a class="btn btn-ghost" th:href="@{/admin/gallery}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/components :: overlays}"></th:block>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
