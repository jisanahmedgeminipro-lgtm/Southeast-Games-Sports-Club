# =============================================================================
#  SEU Games & Sports Club Management System - COMMON configuration
#  Profile-specific overrides live in:
#     - application-dev.properties   (local development)
#     - application-prod.properties  (production)
#  Activate with:  --spring.profiles.active=dev   (default below is 'dev')
# =============================================================================

spring.application.name=SEU Games & Sports Club Management System

# Default active profile (override via env var SPRING_PROFILES_ACTIVE or CLI arg)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# -----------------------------------------------------------------------------
#  Server
# -----------------------------------------------------------------------------
server.port=${SERVER_PORT:8080}
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.error.whitelabel.enabled=false
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json

# -----------------------------------------------------------------------------
#  JPA / Hibernate (common)
# -----------------------------------------------------------------------------
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# -----------------------------------------------------------------------------
#  Thymeleaf
# -----------------------------------------------------------------------------
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# -----------------------------------------------------------------------------
#  File upload (committee photos, banners, gallery, news/achievement images)
# -----------------------------------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB

# -----------------------------------------------------------------------------
#  Mail (JavaMailSender) - credentials supplied per-profile / via env vars
# -----------------------------------------------------------------------------
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# -----------------------------------------------------------------------------
#  Actuator (dashboard / monitoring)
# -----------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# -----------------------------------------------------------------------------
#  Application-specific settings (bound via @ConfigurationProperties later)
# -----------------------------------------------------------------------------
# Allowed registration email domain
app.registration.allowed-email-domain=seu.edu.bd

# One-Time-Password (OTP) policy
app.otp.length=6
app.otp.expiry-minutes=5
app.otp.resend-cooldown-seconds=60

# File storage root for uploaded images (served under /uploads/**)
app.upload.base-dir=${UPLOAD_DIR:uploads}

# Optional admin bootstrap: when both are set, an admin account is created on
# startup if it doesn't exist (see AdminInitializer). Leave blank to disable.
app.admin.email=${ADMIN_EMAIL:}
app.admin.password=${ADMIN_PASSWORD:}

# Branding / outbound email identity (defaults to the SMTP username when blank)
app.mail.from=${MAIL_FROM:}
app.club.name=Southeast University Games & Sports Club
