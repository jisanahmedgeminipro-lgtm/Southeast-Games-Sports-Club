<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Committee | SEU Admin', 'Manage committee members.')}"></head>
<body>
<div class="dash">
    <aside th:replace="~{fragments/admin :: sidebar('committee')}"></aside>
    <div class="dash__overlay"></div>
    <div class="dash__main">
        <header th:replace="~{fragments/admin :: topbar('Committee Members')}"></header>
        <div class="dash__content">
            <th:block th:replace="~{fragments/admin :: flash}"></th:block>
            <div class="admin-head">
                <h2>Committee Members</h2>
                <div class="admin-head__actions"><a class="btn btn-primary" th:href="@{/admin/committee/new}"><i class="bi bi-plus-lg"></i> Add Member</a></div>
            </div>

            <div class="dt dt--responsive" id="committeeTable" data-enhanced-table data-page-size="10"
                 data-export-name="committee" data-bulk-action="/admin/committee/bulk-delete">
                <div class="dt__toolbar">
                    <div class="dt__search"><i class="bi bi-search"></i><input type="search" data-dt-search placeholder="Search members..."></div>
                    <select class="dt__filter" data-dt-filter data-col="3">
                        <option value="">All committees</option>
                        <option value="EXECUTIVE">Executive</option>
                        <option value="SUB_EXECUTIVE">Sub Executive</option>
                    </select>
                    <button class="btn btn-outline btn-sm" type="button" data-dt-export><i class="bi bi-filetype-csv"></i> CSV</button>
                    <button class="btn btn-outline btn-sm" type="button" data-dt-export-excel><i class="bi bi-file-earmark-excel"></i> Excel</button>
                </div>
                <div class="dt__bulkbar" data-dt-bulkbar>
                    <span><strong data-dt-count>0</strong> selected</span>
                    <button class="btn btn-danger btn-sm" type="button" data-dt-bulk-delete><i class="bi bi-trash"></i> Delete selected</button>
                </div>
                <div class="table-wrap">
                    <table class="table">
                        <thead><tr>
                            <th data-dt-skip><input type="checkbox" data-dt-select-all></th>
                            <th data-dt-skip>Photo</th><th data-sort>Name</th><th data-sort>Committee</th>
                            <th data-sort>Position</th><th data-sort>Department</th><th data-sort>Order</th><th data-dt-skip>Actions</th>
                        </tr></thead>
                        <tbody>
                            <tr th:each="m : ${members}">
                                <td data-dt-skip><input type="checkbox" data-dt-row name="ids" th:value="${m.id}"></td>
                                <td data-dt-skip><img class="img-thumb" th:if="${m.photoUrl != null}" th:src="${m.photoUrl}" alt=""><span class="img-thumb" th:unless="${m.photoUrl != null}"></span></td>
                                <td data-label="Name" th:text="${m.name}">Name</td>
                                <td data-label="Committee" th:text="${m.committeeType}">EXECUTIVE</td>
                                <td data-label="Position" th:text="${m.position}">President</td>
                                <td data-label="Department" th:text="${m.department}">CSE</td>
                                <td data-label="Order" th:text="${m.displayOrder}">1</td>
                                <td data-label="Actions" data-dt-skip>
                                    <div class="row-actions">
                                        <a class="icon-btn" th:href="@{/admin/committee/{id}/edit(id=${m.id})}"><i class="bi bi-pencil"></i></a>
                                        <form th:action="@{/admin/committee/{id}/delete(id=${m.id})}" method="post" class="form-inline">
                                            <button class="icon-btn" type="button" data-confirm="Delete this member?" data-confirm-title="Delete member?"><i class="bi bi-trash"></i></button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(members)}"><td colspan="8">
                                <div th:replace="~{fragments/components :: emptyState('bi-people','No members yet','Add executive and sub-executive members.','/admin/committee/new','Add Member')}"></div>
                            </td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="dt__pagination"><span class="u-muted u-sm" data-dt-info></span><div class="pages" data-dt-pages></div></div>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/components :: overlays}"></th:block>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
