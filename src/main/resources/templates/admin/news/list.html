<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('News | SEU Admin', 'Manage news articles.')}"></head>
<body>
<div class="dash">
    <aside th:replace="~{fragments/admin :: sidebar('news')}"></aside>
    <div class="dash__overlay"></div>
    <div class="dash__main">
        <header th:replace="~{fragments/admin :: topbar('News')}"></header>
        <div class="dash__content">
            <th:block th:replace="~{fragments/admin :: flash}"></th:block>
            <div class="admin-head"><h2>News</h2>
                <div class="admin-head__actions"><a class="btn btn-primary" th:href="@{/admin/news/new}"><i class="bi bi-plus-lg"></i> Add Article</a></div></div>

            <div class="dt dt--responsive" id="newsTable" data-enhanced-table data-page-size="10"
                 data-export-name="news" data-bulk-action="/admin/news/bulk-delete">
                <div class="dt__toolbar">
                    <div class="dt__search"><i class="bi bi-search"></i><input type="search" data-dt-search placeholder="Search news..."></div>
                    <select class="dt__filter" data-dt-filter data-col="3">
                        <option value="">All statuses</option><option value="DRAFT">Draft</option><option value="PUBLISHED">Published</option>
                    </select>
                    <button class="btn btn-outline btn-sm" type="button" data-dt-export><i class="bi bi-filetype-csv"></i> CSV</button>
                    <button class="btn btn-outline btn-sm" type="button" data-dt-export-excel><i class="bi bi-file-earmark-excel"></i> Excel</button>
                </div>
                <div class="dt__bulkbar" data-dt-bulkbar><span><strong data-dt-count>0</strong> selected</span>
                    <button class="btn btn-danger btn-sm" type="button" data-dt-bulk-delete><i class="bi bi-trash"></i> Delete selected</button></div>
                <div class="table-wrap"><table class="table">
                    <thead><tr><th data-dt-skip><input type="checkbox" data-dt-select-all></th>
                        <th data-dt-skip>Image</th><th data-sort>Title</th><th data-sort>Status</th>
                        <th data-sort>Publish Date</th><th data-dt-skip>Actions</th></tr></thead>
                    <tbody>
                        <tr th:each="n : ${newsList}">
                            <td data-dt-skip><input type="checkbox" data-dt-row name="ids" th:value="${n.id}"></td>
                            <td data-dt-skip><img class="img-thumb" th:if="${n.imageUrl != null}" th:src="${n.imageUrl}" alt=""><span class="img-thumb" th:unless="${n.imageUrl != null}"></span></td>
                            <td data-label="Title" th:text="${n.title}">Title</td>
                            <td data-label="Status" th:text="${n.status}">DRAFT</td>
                            <td data-label="Publish Date" th:text="${n.publishDate}">—</td>
                            <td data-label="Actions" data-dt-skip><div class="row-actions">
                                <a class="icon-btn" th:href="@{/admin/news/{id}/edit(id=${n.id})}"><i class="bi bi-pencil"></i></a>
                                <form th:action="@{/admin/news/{id}/delete(id=${n.id})}" method="post" class="form-inline">
                                    <button class="icon-btn" type="button" data-confirm="Delete this article?" data-confirm-title="Delete article?"><i class="bi bi-trash"></i></button>
                                </form></div></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(newsList)}"><td colspan="6">
                            <div th:replace="~{fragments/components :: emptyState('bi-newspaper','No articles yet','Write your first news article.','/admin/news/new','Add Article')}"></div></td></tr>
                    </tbody>
                </table></div>
                <div class="dt__pagination"><span class="u-muted u-sm" data-dt-info></span><div class="pages" data-dt-pages></div></div>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/components :: overlays}"></th:block>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
