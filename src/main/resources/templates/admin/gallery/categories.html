<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Gallery Categories | SEU Admin', 'Manage gallery categories.')}"></head>
<body>
<div class="dash">
    <aside th:replace="~{fragments/admin :: sidebar('gallery')}"></aside>
    <div class="dash__overlay"></div>
    <div class="dash__main">
        <header th:replace="~{fragments/admin :: topbar('Gallery Categories')}"></header>
        <div class="dash__content">
            <th:block th:replace="~{fragments/admin :: flash}"></th:block>
            <div class="admin-head"><h2>Gallery Categories</h2>
                <div class="admin-head__actions"><a class="btn btn-primary" th:href="@{/admin/gallery/categories/new}"><i class="bi bi-plus-lg"></i> Add Category</a></div></div>

            <div class="dt dt--responsive" id="galCatTable" data-enhanced-table data-page-size="10"
                 data-export-name="gallery-categories" data-bulk-action="/admin/gallery/categories/bulk-delete">
                <div class="dt__toolbar">
                    <div class="dt__search"><i class="bi bi-search"></i><input type="search" data-dt-search placeholder="Search categories..."></div>
                    <button class="btn btn-outline btn-sm" type="button" data-dt-export><i class="bi bi-filetype-csv"></i> CSV</button>
                    <button class="btn btn-outline btn-sm" type="button" data-dt-export-excel><i class="bi bi-file-earmark-excel"></i> Excel</button>
                </div>
                <div class="dt__bulkbar" data-dt-bulkbar><span><strong data-dt-count>0</strong> selected</span>
                    <button class="btn btn-danger btn-sm" type="button" data-dt-bulk-delete><i class="bi bi-trash"></i> Delete selected</button></div>
                <div class="table-wrap"><table class="table">
                    <thead><tr><th data-dt-skip><input type="checkbox" data-dt-select-all></th>
                        <th data-sort>Name</th><th data-sort>Slug</th><th data-sort>Images</th><th data-dt-skip>Actions</th></tr></thead>
                    <tbody>
                        <tr th:each="c : ${categories}">
                            <td data-dt-skip><input type="checkbox" data-dt-row name="ids" th:value="${c.id}"></td>
                            <td data-label="Name" th:text="${c.name}">Category</td>
                            <td data-label="Slug" th:text="${c.slug}">slug</td>
                            <td data-label="Images" th:text="${c.imageCount}">0</td>
                            <td data-label="Actions" data-dt-skip><div class="row-actions">
                                <a class="icon-btn" th:href="@{/admin/gallery/categories/{id}/images(id=${c.id})}" aria-label="Images" title="Manage images"><i class="bi bi-images"></i></a>
                                <a class="icon-btn" th:href="@{/admin/gallery/categories/{id}/edit(id=${c.id})}"><i class="bi bi-pencil"></i></a>
                                <form th:action="@{/admin/gallery/categories/{id}/delete(id=${c.id})}" method="post" class="form-inline">
                                    <button class="icon-btn" type="button" data-confirm="Delete this category and all its images?" data-confirm-title="Delete category?"><i class="bi bi-trash"></i></button>
                                </form></div></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(categories)}"><td colspan="5">
                            <div th:replace="~{fragments/components :: emptyState('bi-images','No categories yet','Create albums to organize gallery photos.','/admin/gallery/categories/new','Add Category')}"></div></td></tr>
                    </tbody>
                </table></div>
                <div class="dt__pagination"><span class="u-muted u-sm" data-dt-info></span><div class="pages" data-dt-pages></div></div>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/components :: overlays}"></th:block>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
