<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Membership Periods | SEU Admin', 'Manage membership drives.')}"></head>
<body>
<div class="dash">
    <aside th:replace="~{fragments/admin :: sidebar('membership')}"></aside>
    <div class="dash__overlay"></div>
    <div class="dash__main">
        <header th:replace="~{fragments/admin :: topbar('Membership Periods')}"></header>
        <div class="dash__content">
            <th:block th:replace="~{fragments/admin :: flash}"></th:block>
            <div class="admin-head"><h2>Membership Periods</h2>
                <div class="admin-head__actions">
                    <a class="btn btn-outline" th:href="@{/admin/applications}"><i class="bi bi-inbox"></i> Applications</a>
                    <a class="btn btn-primary" th:href="@{/admin/membership/new}"><i class="bi bi-plus-lg"></i> New Period</a>
                </div></div>

            <div class="dt dt--responsive" id="periodTable" data-enhanced-table data-page-size="10" data-export-name="membership-periods">
                <div class="dt__toolbar">
                    <div class="dt__search"><i class="bi bi-search"></i><input type="search" data-dt-search placeholder="Search periods..."></div>
                    <button class="btn btn-outline btn-sm" type="button" data-dt-export><i class="bi bi-filetype-csv"></i> CSV</button>
                    <button class="btn btn-outline btn-sm" type="button" data-dt-export-excel><i class="bi bi-file-earmark-excel"></i> Excel</button>
                </div>
                <div class="table-wrap"><table class="table">
                    <thead><tr><th data-sort>Title</th><th data-sort>Opens</th><th data-sort>Closes</th>
                        <th data-sort>Status</th><th>Notified</th><th data-dt-skip>Actions</th></tr></thead>
                    <tbody>
                        <tr th:each="p : ${periods}">
                            <td data-label="Title" th:text="${p.title}">Drive</td>
                            <td data-label="Opens" th:text="${p.openingDate}">2026-01-01</td>
                            <td data-label="Closes" th:text="${p.closingDate}">2026-02-01</td>
                            <td data-label="Status"><span class="badge"
                                th:classappend="${p.status == 'OPEN'} ? 'badge--green' : (${p.status == 'CLOSED'} ? 'badge--slate' : 'badge--amber')"
                                th:text="${p.status}">DRAFT</span></td>
                            <td data-label="Notified" th:text="${p.notificationSent} ? 'Yes' : 'No'">No</td>
                            <td data-label="Actions" data-dt-skip><div class="row-actions">
                                <a class="icon-btn" th:href="@{/admin/membership/{id}/edit(id=${p.id})}" title="Edit"><i class="bi bi-pencil"></i></a>
                                <form th:if="${p.status != 'OPEN'}" th:action="@{/admin/membership/{id}/open(id=${p.id})}" method="post" class="form-inline">
                                    <button class="btn btn-primary btn-sm" type="button"
                                            data-confirm="Open this drive and email ALL registered students?" data-confirm-title="Open membership?" data-confirm-ok-text="Open"><i class="bi bi-unlock"></i> Open</button>
                                </form>
                                <form th:if="${p.status == 'OPEN'}" th:action="@{/admin/membership/{id}/close(id=${p.id})}" method="post" class="form-inline">
                                    <button class="btn btn-outline btn-sm" type="button"
                                            data-confirm="Close this membership drive?" data-confirm-title="Close membership?" data-confirm-ok-text="Close"><i class="bi bi-lock"></i> Close</button>
                                </form>
                            </div></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(periods)}"><td colspan="6">
                            <div th:replace="~{fragments/components :: emptyState('bi-card-checklist','No periods yet','Create a membership drive to open registrations.','/admin/membership/new','New Period')}"></div></td></tr>
                    </tbody>
                </table></div>
                <div class="dt__pagination"><span class="u-muted u-sm" data-dt-info></span><div class="pages" data-dt-pages></div></div>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/components :: overlays}"></th:block>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
