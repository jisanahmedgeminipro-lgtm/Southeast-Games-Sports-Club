<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Sport | SEU Admin', 'Create or edit a sport.')}"></head>
<body>
<div class="dash">
    <aside th:replace="~{fragments/admin :: sidebar('sports')}"></aside>
    <div class="dash__overlay"></div>
    <div class="dash__main">
        <header th:replace="~{fragments/admin :: topbar('Sport')}"></header>
        <div class="dash__content">
            <th:block th:replace="~{fragments/admin :: flash}"></th:block>
            <div class="admin-head">
                <h2 th:text="${sport != null} ? 'Edit Sport' : 'New Sport'">Sport</h2>
                <a class="btn btn-ghost" th:href="@{/admin/sports}"><i class="bi bi-arrow-left"></i> Back</a>
            </div>

            <form class="form-card" th:action="@{/admin/sports/save}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="id" th:if="${sport != null}" th:value="${sport.id}">
                <div class="form-grid">
                    <div class="field"><label for="name">Name</label>
                        <input class="control" id="name" name="name" type="text" required th:value="${sport?.name}"></div>
                    <div class="field"><label for="displayOrder">Display Order</label>
                        <input class="control" id="displayOrder" name="displayOrder" type="number" th:value="${sport?.displayOrder}"></div>
                </div>
                <div class="field"><label for="description">Description</label>
                    <textarea class="control" id="description" name="description" rows="3" th:text="${sport?.description}"></textarea></div>
                <div class="field">
                    <label class="switch-inline"><input type="checkbox" name="active" value="true" th:checked="${sport == null or sport.active}"> Active</label>
                </div>

                <div class="form-grid">
                    <div>
                        <label class="u-fw-600 u-mb-1 u-block">Icon</label>
                        <img class="current-image" th:if="${sport != null and sport.iconUrl != null}" th:src="${sport.iconUrl}" alt="Icon">
                        <input type="hidden" name="currentIconMediaId" th:value="${sport?.iconMediaId}">
                        <div th:replace="~{fragments/components :: imageUpload('iconFile','Upload icon (optional)',false)}"></div>
                    </div>
                    <div>
                        <label class="u-fw-600 u-mb-1 u-block">Cover Image</label>
                        <img class="current-image" th:if="${sport != null and sport.imageUrl != null}" th:src="${sport.imageUrl}" alt="Image">
                        <input type="hidden" name="currentImageMediaId" th:value="${sport?.imageMediaId}">
                        <div th:replace="~{fragments/components :: imageUpload('imageFile','Upload cover (optional)',false)}"></div>
                    </div>
                </div>

                <div class="form-actions">
                    <button class="btn btn-primary" type="submit"><i class="bi bi-save"></i> Save</button>
                    <a class="btn btn-ghost" th:href="@{/admin/sports}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/components :: overlays}"></th:block>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
