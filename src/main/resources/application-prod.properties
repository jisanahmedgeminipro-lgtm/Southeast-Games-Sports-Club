# =============================================================================
#  PRODUCTION profile  (spring.profiles.active=prod)
#  All secrets MUST be provided via environment variables. No credentials are
#  hard-coded. Hibernate only validates the schema (managed by migrations/DBA).
# =============================================================================

# -----------------------------------------------------------------------------
#  Datasource - production MySQL (env-driven)
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useSSL=true&requireSSL=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.pool-name=SeuSportsHikariPool-Prod

# -----------------------------------------------------------------------------
#  JPA / Hibernate (prod) - never auto-mutate schema in production
# -----------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# -----------------------------------------------------------------------------
#  Thymeleaf - enable template caching in production
# -----------------------------------------------------------------------------
spring.thymeleaf.cache=true

# -----------------------------------------------------------------------------
#  Secure cookies (HTTPS only)
# -----------------------------------------------------------------------------
server.servlet.session.cookie.secure=true

# -----------------------------------------------------------------------------
#  Logging
# -----------------------------------------------------------------------------
logging.level.root=WARN
logging.level.bd.edu.seu.gamesclub=INFO
logging.level.org.springframework.security=WARN
logging.file.name=${LOG_FILE:logs/seu-sports-club.log}
