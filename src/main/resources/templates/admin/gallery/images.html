<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Gallery Images | SEU Admin', 'Manage images in a gallery category.')}"></head>
<body>
<div class="dash">
    <aside th:replace="~{fragments/admin :: sidebar('gallery')}"></aside>
    <div class="dash__overlay"></div>
    <div class="dash__main">
        <header th:replace="~{fragments/admin :: topbar('Gallery Images')}"></header>
        <div class="dash__content">
            <th:block th:replace="~{fragments/admin :: flash}"></th:block>
            <div class="admin-head">
                <h2>Images - <span th:text="${category.name}">Category</span></h2>
                <a class="btn btn-ghost" th:href="@{/admin/gallery}"><i class="bi bi-arrow-left"></i> Back to categories</a>
            </div>

            <form class="form-card u-mb-3" th:action="@{/admin/gallery/images/upload}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="categoryId" th:value="${category.id}">
                <div class="form-grid">
                    <div class="field"><label for="caption">Caption</label>
                        <input class="control" id="caption" name="caption" type="text"></div>
                    <div class="field"><label for="displayOrder">Display Order</label>
                        <input class="control" id="displayOrder" name="displayOrder" type="number" value="0"></div>
                </div>
                <div th:replace="~{fragments/components :: imageUpload('imageFile','Upload image',false)}"></div>
                <div class="form-actions"><button class="btn btn-primary" type="submit"><i class="bi bi-cloud-arrow-up"></i> Upload Image</button></div>
            </form>

            <div class="gallery-grid" th:if="${!#lists.isEmpty(images)}">
                <div class="gallery-item gallery-item--static" th:each="img : ${images}">
                    <img th:src="${img.url}" th:alt="${img.caption} ?: 'Image'" loading="lazy">
                    <form th:action="@{/admin/gallery/images/{id}/delete(id=${img.id})}" method="post" class="form-inline">
                        <input type="hidden" name="categoryId" th:value="${category.id}">
                        <button class="gallery-del-btn" type="button"
                                data-confirm="Delete this image?" data-confirm-title="Delete image?"><i class="bi bi-trash"></i></button>
                    </form>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(images)}"
                 th:replace="~{fragments/components :: emptyState('bi-image','No images yet','Upload images to this category above.',null,null)}"></div>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/components :: overlays}"></th:block>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
