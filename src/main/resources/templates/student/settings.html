<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Settings | SEU Games & Sports Club', 'Update your SEU Games & Sports Club profile.')}"></head>
<body>
<div class="dash">

    <aside class="dash__sidebar">
        <a class="dash__brand" th:href="@{/}"><span class="brand__logo"><i class="bi bi-trophy"></i></span> SEU Sports</a>
        <nav class="dash__nav" aria-label="Student navigation">
            <a th:href="@{/student/dashboard}"><i class="bi bi-grid-1x2"></i> Dashboard</a>
            <a th:href="@{/student/profile}"><i class="bi bi-person-circle"></i> My Profile</a>
            <a th:href="@{/student/dashboard}"><i class="bi bi-card-checklist"></i> Membership</a>
            <a th:href="@{/events}"><i class="bi bi-calendar-event"></i> Events</a>
            <a th:href="@{/student/notices}"><i class="bi bi-megaphone"></i> Notices</a>
            <span class="label">Account</span>
            <a class="active" th:href="@{/student/profile/edit}"><i class="bi bi-gear"></i> Settings</a>
        </nav>
        <div class="dash__sidebar-foot">
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-outline btn-block" type="submit"><i class="bi bi-box-arrow-right"></i> Logout</button>
            </form>
        </div>
    </aside>
    <div class="dash__overlay"></div>

    <div class="dash__main">
        <header class="dash__topbar">
            <div class="u-flex u-items-center u-gap-2">
                <button class="icon-btn dash__menu-btn" type="button" aria-label="Open menu"><i class="bi bi-list"></i></button>
                <h1>Settings</h1>
            </div>
            <div class="dash__topbar-actions">
                <a class="icon-btn" th:href="@{/}" title="View site" aria-label="View site"><i class="bi bi-box-arrow-up-right"></i></a>
                <button class="icon-btn theme-toggle" data-theme-toggle type="button" aria-label="Toggle theme"><i class="bi bi-moon-stars"></i><i class="bi bi-sun"></i></button>
                <div class="dash__user">
                    <span class="dash__avatar" th:text="${studentProfile != null ? #strings.substring(studentProfile.fullName,0,1) : 'S'}">S</span>
                    <div>
                        <strong th:text="${studentProfile != null ? studentProfile.fullName : 'Student'}">Student</strong><br>
                        <small class="u-muted" th:text="${studentProfile != null ? studentProfile.studentId : ''}">ID</small>
                    </div>
                </div>
            </div>
        </header>

        <div class="dash__content">
            <div class="js-flash" th:if="${successMessage}" data-type="success" th:attr="data-message=${successMessage}"></div>
            <div class="js-flash" th:if="${errorMessage}" data-type="error" th:attr="data-message=${errorMessage}"></div>

            <div class="admin-head">
                <h2>Edit Profile</h2>
                <a class="btn btn-ghost" th:href="@{/student/profile}"><i class="bi bi-arrow-left"></i> Back</a>
            </div>

            <form class="form-card" th:action="@{/student/profile}" method="post" enctype="multipart/form-data" novalidate>
                <div class="form-grid">
                    <div class="field">
                        <label for="fullName">Full Name</label>
                        <input class="control" id="fullName" name="fullName" type="text" required
                               th:value="${studentProfile != null ? studentProfile.fullName : ''}">
                    </div>
                    <div class="field">
                        <label for="phone">Phone</label>
                        <input class="control" id="phone" name="phone" type="text" required
                               th:value="${studentProfile != null ? studentProfile.phone : ''}">
                    </div>
                    <div class="field">
                        <label for="department">Department</label>
                        <input class="control" id="department" name="department" type="text" required
                               th:value="${studentProfile != null ? studentProfile.department : ''}">
                    </div>
                    <div class="field">
                        <label for="batch">Batch</label>
                        <input class="control" id="batch" name="batch" type="text" required
                               th:value="${studentProfile != null ? studentProfile.batch : ''}">
                    </div>
                    <div class="field">
                        <label for="semester">Semester</label>
                        <input class="control" id="semester" name="semester" type="text" required
                               th:value="${studentProfile != null ? studentProfile.semester : ''}">
                    </div>
                    <div class="field">
                        <label for="gender">Gender</label>
                        <select class="control" id="gender" name="gender" required>
                            <option value="MALE" th:selected="${studentProfile != null and studentProfile.gender == 'MALE'}">Male</option>
                            <option value="FEMALE" th:selected="${studentProfile != null and studentProfile.gender == 'FEMALE'}">Female</option>
                            <option value="OTHER" th:selected="${studentProfile != null and studentProfile.gender == 'OTHER'}">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="field">
                        <label for="emailRO">University Email (read-only)</label>
                        <input class="control" id="emailRO" type="email" disabled
                               th:value="${studentProfile != null ? studentProfile.email : ''}">
                    </div>
                    <div class="field">
                        <label for="studentIdRO">Student ID (read-only)</label>
                        <input class="control" id="studentIdRO" type="text" disabled
                               th:value="${studentProfile != null ? studentProfile.studentId : ''}">
                    </div>
                </div>

                <label class="u-fw-600 u-mb-1 u-block">Profile Photo</label>
                <img class="current-image" th:if="${studentProfile != null and studentProfile.profilePictureUrl != null}"
                     th:src="${studentProfile.profilePictureUrl}" alt="Current profile photo">
                <div th:replace="~{fragments/components :: imageUpload('profileImage','Upload a new photo (optional)',false)}"></div>

                <div class="form-actions">
                    <button class="btn btn-primary" type="submit"><i class="bi bi-save"></i> Save Changes</button>
                    <a class="btn btn-ghost" th:href="@{/student/profile}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/components :: overlays}"></th:block>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
